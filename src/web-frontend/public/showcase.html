<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartAI 3D - 模型展示</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0a0a0f;
            color: white;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            overflow: hidden;
            height: 100vh;
        }

        /* 头部 */
        .header {
            padding: 20px 40px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(10, 10, 15, 0.9);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
        }

        .header h1 {
            font-size: 24px;
            font-weight: 600;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .header .subtitle {
            font-size: 14px;
            color: rgba(255, 255, 255, 0.5);
        }

        /* 网格布局 */
        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            grid-template-rows: repeat(2, 1fr);
            gap: 20px;
            padding: 20px 40px;
            height: calc(100vh - 80px);
        }

        /* 卡片 */
        .gallery-card {
            position: relative;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 16px;
            overflow: hidden;
            transition: all 0.3s ease;
        }

        .gallery-card:hover {
            border-color: rgba(102, 126, 234, 0.3);
            box-shadow: 0 8px 32px rgba(102, 126, 234, 0.2);
            transform: translateY(-4px);
        }

        /* 3D 画布容器 */
        .card-3d-container {
            width: 100%;
            height: 100%;
            position: relative;
        }

        .card-3d-container canvas {
            width: 100% !important;
            height: 100% !important;
            display: block;
        }

        /* 卡片信息 */
        .card-info {
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 10;
        }

        .card-title {
            font-size: 18px;
            font-weight: 600;
            color: white;
            margin-bottom: 4px;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.5);
        }

        .card-tag {
            display: inline-block;
            padding: 4px 12px;
            background: rgba(102, 126, 234, 0.2);
            border: 1px solid rgba(102, 126, 234, 0.3);
            border-radius: 20px;
            font-size: 12px;
            color: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
        }

        /* 操作按钮 */
        .card-actions {
            position: absolute;
            top: 20px;
            right: 20px;
            z-index: 10;
            display: flex;
            gap: 8px;
        }

        .btn-action {
            padding: 8px 16px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            color: rgba(255, 255, 255, 0.8);
            font-size: 12px;
            cursor: pointer;
            backdrop-filter: blur(10px);
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .btn-action:hover {
            background: rgba(102, 126, 234, 0.3);
            border-color: rgba(102, 126, 234, 0.5);
            color: white;
        }

        /* 底部信息 */
        .card-footer {
            position: absolute;
            bottom: 20px;
            left: 20px;
            right: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 10;
        }

        .hint-text {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.5);
        }

        .fps-counter {
            padding: 4px 8px;
            background: rgba(0, 0, 0, 0.5);
            border-radius: 6px;
            font-size: 11px;
            color: #667eea;
            font-weight: 600;
        }

        /* 加载动画 */
        .loading-overlay {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(0, 0, 0, 0.3);
            z-index: 5;
            transition: opacity 0.5s;
        }

        .loading-overlay.hidden {
            opacity: 0;
            pointer-events: none;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(102, 126, 234, 0.2);
            border-top-color: #667eea;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* 背景星星 */
        .star {
            position: absolute;
            background: rgba(102, 126, 234, 0.3);
            border-radius: 50%;
            pointer-events: none;
        }

        /* 响应式 */
        @media (max-width: 1200px) {
            .gallery-grid {
                grid-template-columns: repeat(2, 1fr);
                grid-template-rows: repeat(3, 1fr);
                padding: 20px;
                gap: 16px;
            }
        }

        @media (max-width: 768px) {
            .gallery-grid {
                grid-template-columns: 1fr;
                grid-template-rows: repeat(6, 1fr);
                padding: 16px;
                gap: 12px;
            }

            .header {
                padding: 16px 20px;
            }

            .header h1 {
                font-size: 20px;
            }
        }
    </style>
</head>
<body>
    <!-- 头部 -->
    <div class="header">
        <div>
            <h1>SmartAI 3D 模型展示</h1>
            <div class="subtitle">3D Gaussian Splatting 渲染引擎 · 高性能实时渲染</div>
        </div>
    </div>

    <!-- 6 个模型卡片 -->
    <div class="gallery-grid" id="galleryGrid">
        <!-- 卡片通过 JavaScript 动态生成 -->
    </div>

    <!-- 背景星星容器 -->
    <div id="starsContainer" style="position: fixed; inset: 0; pointer-events: none; z-index: 0;"></div>

    <!-- Import Map -->
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.180.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.180.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        // 模型数据
        const MODELS = [
            {
                title: 'Penguin',
                tag: 'SPZ · 动物',
                url: 'https://sparkjs.dev/assets/splats/butterfly.spz',
                emoji: ''
            },
            {
                title: 'Sample Dragon2',
                tag: 'PLY · 动物',
                url: 'https://sparkjs.dev/assets/splats/fly.spz',
                emoji: '🐉'
            },
            {
                title: 'Butterfly',
                tag: 'SPZ · 动物',
                url: 'https://sparkjs.dev/assets/splats/dessert.spz',
                emoji: ''
            },
            {
                title: 'Cat',
                tag: 'SPZ · 动物',
                url: 'https://sparkjs.dev/assets/splats/food/burger-from-amboy.spz',
                emoji: '🐱'
            },
            {
                title: 'Penguin',
                tag: 'SPZ · 动物',
                url: 'https://sparkjs.dev/assets/splats/food/branzino-amarin.spz',
                emoji: '🐧'
            },
            {
                title: 'Woobles',
                tag: 'SPZ · 动物',
                url: 'https://sparkjs.dev/assets/splats/food/clams-and-caviar-by-ikoyi.spz',
                emoji: ''
            }
        ];

        // 全局变量
        const scenes = [];
        const cameras = [];
        const renderers = [];
        const controls = [];
        const stars = [];
        let animationId = null;

        // 创建星星背景
        function createStars() {
            const container = document.getElementById('starsContainer');
            for (let i = 0; i < 200; i++) {
                const star = document.createElement('div');
                star.className = 'star';
                star.style.left = Math.random() * 100 + '%';
                star.style.top = Math.random() * 100 + '%';
                star.style.width = Math.random() * 2 + 1 + 'px';
                star.style.height = star.style.width;
                star.style.opacity = Math.random() * 0.5 + 0.2;
                container.appendChild(star);
            }
        }

        // 创建卡片 DOM
        function createCard(model, index) {
            const card = document.createElement('div');
            card.className = 'gallery-card';
            card.id = `card-${index}`;

            card.innerHTML = `
                <div class="card-3d-container" id="canvas-${index}"></div>
                <div class="card-info">
                    <div class="card-title">${model.emoji} ${model.title}</div>
                    <span class="card-tag">${model.tag}</span>
                </div>
                <div class="card-actions">
                    <button class="btn-action" onclick="handleScreenshot(${index})">
                        📷 截图
                    </button>
                </div>
                <div class="loading-overlay" id="loading-${index}">
                    <div class="spinner"></div>
                </div>
                <div class="card-footer">
                    <span class="hint-text">拖拽旋转 · 滚轮缩放</span>
                    <span class="fps-counter" id="fps-${index}">3DGS FPS: --</span>
                </div>
            `;

            return card;
        }

        // 初始化场景
        async function initScene(index, modelUrl) {
            const container = document.getElementById(`canvas-${index}`);
            const loadingOverlay = document.getElementById(`loading-${index}`);
            const fpsCounter = document.getElementById(`fps-${index}`);

            if (!container) return;

            // 场景
            const scene = new THREE.Scene();
            scene.background = new THREE.Color(0x0a0a0f);
            scenes[index] = scene;

            // 相机
            const camera = new THREE.PerspectiveCamera(
                50,
                container.clientWidth / container.clientHeight,
                0.1,
                1000
            );
            camera.position.set(0, 0.6, 4);
            cameras[index] = camera;

            // 渲染器
            const renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(container.clientWidth, container.clientHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            container.appendChild(renderer.domElement);
            renderers[index] = renderer;

            // 控制器
            const orbitControls = new OrbitControls(camera, renderer.domElement);
            orbitControls.enableDamping = true;
            orbitControls.dampingFactor = 0.05;
            orbitControls.target.set(0, 0, 0);
            orbitControls.enabled = true;
            orbitControls.minDistance = 0.5;
            orbitControls.maxDistance = 20;
            orbitControls.autoRotate = true;
            orbitControls.autoRotateSpeed = 0.5;
            controls[index] = orbitControls;

            // 隐藏加载层
            setTimeout(() => {
                loadingOverlay.classList.add('hidden');
            }, 1000);

            // 响应式
            window.addEventListener('resize', () => {
                onWindowResize(index, container);
            });
        }

        // 动画循环
        function animate() {
            animationId = requestAnimationFrame(animate);

            scenes.forEach((scene, index) => {
                if (scene && cameras[index] && renderers[index] && controls[index]) {
                    controls[index].update();
                    renderers[index].render(scene, cameras[index]);
                }
            });
        }

        // 窗口调整
        function onWindowResize(index, container) {
            const camera = cameras[index];
            const renderer = renderers[index];

            if (!camera || !renderer) return;

            camera.aspect = container.clientWidth / container.clientHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(container.clientWidth, container.clientHeight);
        }

        // 截图功能
        window.handleScreenshot = function(index) {
            const renderer = renderers[index];
            if (!renderer) return;

            renderer.render(scenes[index], cameras[index]);
            const dataURL = renderer.domElement.toDataURL('image/png');
            
            const link = document.createElement('a');
            link.download = `model-${index}.png`;
            link.href = dataURL;
            link.click();
        };

        // 初始化所有卡片
        function initAllCards() {
            const grid = document.getElementById('galleryGrid');

            MODELS.forEach((model, index) => {
                const card = createCard(model, index);
                grid.appendChild(card);

                // 延迟初始化，避免卡顿
                setTimeout(() => {
                    initScene(index, model.url);
                }, index * 100);
            });

            // 启动动画循环
            animate();
        }

        // 启动
        createStars();
        initAllCards();
    </script>
</body>
</html>
