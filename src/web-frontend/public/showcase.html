<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D 模型展示</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0f0f23 0%, #1a1a2e 50%, #16213e 100%);
            min-height: 100vh;
            color: white;
            overflow-x: hidden;
        }

        .gallery-container {
            width: 100%;
            height: 100vh;
            padding: 12px 60px;
            display: flex;
            align-items: stretch;
        }

        .gallery-grid {
            flex: 1;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            grid-template-rows: 1fr 1fr;
            gap: 12px;
            width: 100%;
            height: 100%;
        }

        .gallery-card-wrapper {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 12px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            transition: all 0.3s ease;
            position: relative;
            min-height: 0;
        }

        .gallery-card-wrapper:hover {
            border-color: rgba(102, 126, 234, 0.3);
            box-shadow: 0 4px 20px rgba(102, 126, 234, 0.15);
            transform: translateY(-2px);
        }

        .gallery-card-3d {
            flex: 1;
            position: relative;
            min-height: 0;
        }

        /* 内嵌详情按钮 - 覆盖在3D画布底部 */
        .gallery-card-detail-btn {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 24px 12px 10px;
            background: linear-gradient(transparent, rgba(0, 0, 0, 0.75));
            border: none;
            color: #667eea;
            font-size: 12px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 4px;
            transition: all 0.3s ease;
            z-index: 5;
            letter-spacing: 0.5px;
            font-weight: 500;
            opacity: 0;
            pointer-events: none;
        }

        .gallery-card-wrapper:hover .gallery-card-detail-btn {
            opacity: 1;
            pointer-events: auto;
        }

        .gallery-card-detail-btn:hover {
            color: #8b9cf7;
            background: linear-gradient(transparent, rgba(102, 126, 234, 0.4));
        }

        .loading-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.8);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10;
        }

        .loading-overlay.hidden {
            display: none;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(102, 126, 234, 0.2);
            border-top-color: #667eea;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* 预览弹窗 - 全屏模式 */
        .preview-modal {
            position: fixed;
            inset: 0;
            z-index: 1000;
            background: #0a0a0f;
        }

        .preview-3d-container {
            width: 100%;
            height: 100%;
            position: relative;
        }

        .preview-3d-container canvas {
            width: 100% !important;
            height: 100% !important;
            display: block;
        }

        /* 预览头部 */
        .preview-header {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            padding: 20px 30px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: linear-gradient(to bottom, rgba(0, 0, 0, 0.8) 0%, transparent 100%);
            z-index: 10;
        }

        .preview-header h2 {
            font-size: 1.8em;
            color: white;
            text-shadow: 0 2px 8px rgba(0, 0, 0, 0.5);
        }

        .close-btn {
            width: 40px;
            height: 40px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 50%;
            color: white;
            font-size: 1.5em;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .close-btn:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: rotate(90deg);
        }

        /* 标签和描述 */
        .preview-info {
            position: absolute;
            top: 80px;
            left: 30px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            z-index: 10;
        }

        .preview-tag {
            display: inline-block;
            padding: 6px 16px;
            background: rgba(102, 126, 234, 0.3);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(102, 126, 234, 0.5);
            border-radius: 20px;
            font-size: 0.9em;
            color: #667eea;
            width: fit-content;
            text-shadow: 0 1px 3px rgba(0, 0, 0, 0.5);
        }

        .preview-description {
            font-size: 1em;
            color: rgba(255, 255, 255, 0.9);
            text-shadow: 0 1px 3px rgba(0, 0, 0, 0.5);
        }

        /* 底部操作栏 */
        .preview-footer {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 20px 30px;
            background: linear-gradient(to top, rgba(0, 0, 0, 0.8) 0%, transparent 100%);
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 10;
        }

        .preview-hint {
            color: rgba(255, 255, 255, 0.7);
            font-size: 0.9em;
            text-shadow: 0 1px 3px rgba(0, 0, 0, 0.5);
        }

        .preview-footer .btn-action {
            width: auto;
            flex: none;
            padding: 12px 24px;
            background: rgba(102, 126, 234, 0.4);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(102, 126, 234, 0.6);
        }

        .preview-footer .btn-action:hover {
            background: rgba(102, 126, 234, 0.6);
        }

        /* 响应式 */
        @media (max-width: 1200px) {
            .gallery-grid {
                grid-template-columns: repeat(2, 1fr);
                grid-template-rows: repeat(3, 1fr);
            }
        }

        @media (max-width: 900px) {
            .gallery-container {
                padding: 12px 50px;
            }
            .gallery-grid {
                grid-template-columns: repeat(1, 1fr);
                grid-template-rows: repeat(6, 1fr);
            }
        }

        .stars-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }

        .star {
            position: absolute;
            background: white;
            border-radius: 50%;
            animation: twinkle 3s infinite;
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0.2; }
            50% { opacity: 0.8; }
        }
    </style>
</head>
<body>
    <div class="stars-container" id="starsContainer"></div>
    
    <div class="gallery-container">
        <div class="gallery-grid" id="galleryGrid"></div>
    </div>

    <!-- Three.js -->
    <script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.180.0/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.180.0/examples/jsm/"
        }
    }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

        // 模型数据
        const MODELS = [
            {
                title: 'Damaged Helmet',
                tag: 'GLB · 道具',
                url: 'https://raw.githubusercontent.com/KhronosGroup/glTF-Sample-Assets/main/Models/DamagedHelmet/glTF-Binary/DamagedHelmet.glb',
                emoji: '⛑️',
                description: '科幻风格的破损头盔模型'
            },
            {
                title: 'Cesium Man',
                tag: 'GLB · 人物',
                url: 'https://raw.githubusercontent.com/KhronosGroup/glTF-Sample-Assets/main/Models/CesiumMan/glTF-Binary/CesiumMan.glb',
                emoji: '🧑',
                description: '经典Cesium人物模型'
            },
            {
                title: 'Avocado',
                tag: 'GLB · 食物',
                url: 'https://raw.githubusercontent.com/KhronosGroup/glTF-Sample-Assets/main/Models/Avocado/glTF-Binary/Avocado.glb',
                emoji: '🥑',
                description: '高精度牛油果模型'
            },
            {
                title: 'Duck',
                tag: 'GLB · 动物',
                url: 'https://raw.githubusercontent.com/KhronosGroup/glTF-Sample-Assets/main/Models/Duck/glTF-Binary/Duck.glb',
                emoji: '🦆',
                description: '经典橡皮鸭模型'
            },
            {
                title: 'Boom Box',
                tag: 'GLB · 电子设备',
                url: 'https://raw.githubusercontent.com/KhronosGroup/glTF-Sample-Assets/main/Models/BoomBox/glTF-Binary/BoomBox.glb',
                emoji: '📻',
                description: '复古收音机模型'
            },
            {
                title: 'Butterfly',
                tag: 'GLB · 动物',
                url: 'https://modelviewer.dev/shared-assets/models/Butterfly.glb',
                emoji: '',
                description: '蝴蝶模型'
            }
        ];

        // 全局变量
        const scenes = [];
        const cameras = [];
        const renderers = [];
        const controls = [];
        const models = [];
        let animationId = null;
        let currentModelIndex = null;

        // 创建星星背景
        function createStars() {
            const container = document.getElementById('starsContainer');
            for (let i = 0; i < 200; i++) {
                const star = document.createElement('div');
                star.className = 'star';
                star.style.left = Math.random() * 100 + '%';
                star.style.top = Math.random() * 100 + '%';
                star.style.width = Math.random() * 2 + 1 + 'px';
                star.style.height = star.style.width;
                star.style.opacity = Math.random() * 0.5 + 0.2;
                container.appendChild(star);
            }
        }

        // 创建卡片
        function createCard(model, index) {
            const wrapper = document.createElement('div');
            wrapper.className = 'gallery-card-wrapper';
            wrapper.id = `card-${index}`;

            wrapper.innerHTML = `
                <div class="gallery-card-3d" id="canvas-${index}">
                    <button class="gallery-card-detail-btn" id="detail-btn-${index}">
                        🔍 查看详情
                    </button>
                    <div class="loading-overlay" id="loading-${index}">
                        <div class="spinner"></div>
                    </div>
                </div>
            `;
            
            // 只在按钮上绑定点击事件
            const detailBtn = wrapper.querySelector(`#detail-btn-${index}`);
            detailBtn.addEventListener('click', (e) => {
                e.stopPropagation();
                openPreview(index);
            });

            return wrapper;
        }

        // 初始化场景
        async function initScene(index, modelUrl) {
            const container = document.getElementById(`canvas-${index}`);
            const loadingOverlay = document.getElementById(`loading-${index}`);
        
            if (!container) {
                console.error(`❌ 容器 ${index} 不存在`);
                return;
            }
            const scene = new THREE.Scene();
            scene.background = new THREE.Color(0x0a0a0f);
            scenes[index] = scene;

            // 星空粒子效果 - 增强立体感
            const starsGeometry = new THREE.BufferGeometry();
            const starsCount = 150;
            const positions = new Float32Array(starsCount * 3);
            const colors = new Float32Array(starsCount * 3);
            
            for (let i = 0; i < starsCount; i++) {
                const i3 = i * 3;
                // 随机分布在场景中
                positions[i3] = (Math.random() - 0.5) * 20;
                positions[i3 + 1] = (Math.random() - 0.5) * 20;
                positions[i3 + 2] = (Math.random() - 0.5) * 20;
                
                // 颜色：蓝紫色调
                colors[i3] = 0.4 + Math.random() * 0.2;
                colors[i3 + 1] = 0.5 + Math.random() * 0.2;
                colors[i3 + 2] = 0.9 + Math.random() * 0.1;
            }
            
            starsGeometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
            starsGeometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));
            
            const starsMaterial = new THREE.PointsMaterial({
                size: 0.05,
                vertexColors: true,
                transparent: true,
                opacity: 0.8,
                sizeAttenuation: true,
                blending: THREE.AdditiveBlending
            });
            
            const stars = new THREE.Points(starsGeometry, starsMaterial);
            scene.add(stars);

            // 灯光
            const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
            scene.add(ambientLight);

            const mainLight = new THREE.DirectionalLight(0xffffff, 1.2);
            mainLight.position.set(5, 5, 5);
            scene.add(mainLight);

            const fillLight = new THREE.DirectionalLight(0xffffff, 0.4);
            fillLight.position.set(-5, -5, -5);
            scene.add(fillLight);

            const bottomLight = new THREE.DirectionalLight(0x667eea, 0.3);
            bottomLight.position.set(0, -3, 0);
            scene.add(bottomLight);

            // 相机
            const camera = new THREE.PerspectiveCamera(
                50,
                container.clientWidth / container.clientHeight,
                0.1,
                1000
            );
            camera.position.set(0, 1.5, 5);
            cameras[index] = camera;

            // 渲染器
            const renderer = new THREE.WebGLRenderer({ 
                antialias: true,
                alpha: true 
            });
            renderer.setSize(container.clientWidth, container.clientHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            renderer.outputColorSpace = THREE.SRGBColorSpace;
            renderer.toneMapping = THREE.ACESFilmicToneMapping;
            renderer.toneMappingExposure = 1.2;
            container.appendChild(renderer.domElement);
            renderers[index] = renderer;

            // 控制器
            const control = new OrbitControls(camera, renderer.domElement);
            control.enableDamping = true;
            control.dampingFactor = 0.05;
            control.autoRotate = true;
            control.autoRotateSpeed = 1;
            control.target.set(0, 0, 0);
            controls[index] = control;

            // 加载模型
            try {
                await loadGLBModel(index, modelUrl, scene);
                loadingOverlay.classList.add('hidden');
            } catch (error) {
                console.error(`❌ 模型 ${index} 加载失败:`, error);
            }

            // 响应式
            window.addEventListener('resize', () => {
                onWindowResize(index, container);
            });
        }

        // 加载模型
        async function loadGLBModel(index, modelUrl, scene) {
            return new Promise((resolve, reject) => {
                const loader = new GLTFLoader();
                loader.load(
                    modelUrl,
                    (gltf) => {
                        const model = gltf.scene;
                        
                        const box = new THREE.Box3().setFromObject(model);
                        const center = box.getCenter(new THREE.Vector3());
                        const size = box.getSize(new THREE.Vector3());
                        const maxDim = Math.max(size.x, size.y, size.z);
                        
                        model.position.sub(center);
                        const scale = 2 / maxDim;
                        model.scale.setScalar(scale);
                        
                        scene.add(model);
                        models[index] = model;
                        resolve();
                    },
                    undefined,
                    (error) => reject(error)
                );
            });
        }

        // 打开预览弹窗
        function openPreview(index) {
            const model = MODELS[index];
            currentModelIndex = index;
            
            const modal = document.createElement('div');
            modal.className = 'preview-modal';
            modal.id = 'preview-modal';
            
            modal.innerHTML = `
                <div class="preview-3d-container" id="preview-canvas"></div>
                <div class="preview-header">
                    <h2>${model.emoji} ${model.title}</h2>
                    <button class="close-btn" id="close-preview-btn"></button>
                </div>
                <div class="preview-info">
                    <span class="preview-tag">${model.tag}</span>
                    <span class="preview-description">${model.description}</span>
                </div>
                <div class="preview-footer">
                    <span class="preview-hint">拖拽旋转 · 滚轮缩放 · ESC 关闭</span>
                    <button class="btn-action" id="preview-screenshot-btn">📷 截图保存</button>
                </div>
            `;
            
            document.body.appendChild(modal);
            
            document.getElementById('close-preview-btn').addEventListener('click', () => closePreview());
            document.getElementById('preview-screenshot-btn').addEventListener('click', () => handlePreviewScreenshot());
            
            setTimeout(() => initPreviewScene(index), 100);
            
            document.addEventListener('keydown', handleEscKey);
        }

        // 关闭预览弹窗
        function closePreview() {
            const modal = document.getElementById('preview-modal');
            if (modal) {
                modal.remove();
            }
            currentModelIndex = null;
            document.removeEventListener('keydown', handleEscKey);
            
            if (previewRenderer) {
                previewRenderer.dispose();
                previewRenderer = null;
            }
        }

        // ESC 键处理
        function handleEscKey(e) {
            if (e.key === 'Escape') {
                closePreview();
            }
        }

        // 预览截图
        function handlePreviewScreenshot() {
            if (!previewRenderer) return;
            
            const link = document.createElement('a');
            link.download = `preview-${MODELS[currentModelIndex].title}.png`;
            link.href = previewRenderer.domElement.toDataURL('image/png');
            link.click();
        }

        // 初始化预览场景
        let previewScene, previewCamera, previewRenderer, previewControls;
        
        async function initPreviewScene(index) {
            const container = document.getElementById('preview-canvas');
            if (!container) return;
            
            previewScene = new THREE.Scene();
            previewScene.background = new THREE.Color(0x0a0a0f);
            
            const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
            previewScene.add(ambientLight);
            
            const mainLight = new THREE.DirectionalLight(0xffffff, 1);
            mainLight.position.set(5, 5, 5);
            previewScene.add(mainLight);
            
            const fillLight = new THREE.DirectionalLight(0xffffff, 0.3);
            fillLight.position.set(-5, -5, -5);
            previewScene.add(fillLight);
            
            previewCamera = new THREE.PerspectiveCamera(
                50,
                container.clientWidth / container.clientHeight,
                0.1,
                1000
            );
            previewCamera.position.set(0, 1.5, 5);
            
            previewRenderer = new THREE.WebGLRenderer({ antialias: true });
            previewRenderer.setSize(container.clientWidth, container.clientHeight);
            previewRenderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            previewRenderer.outputColorSpace = THREE.SRGBColorSpace;
            container.appendChild(previewRenderer.domElement);
            
            previewControls = new OrbitControls(previewCamera, previewRenderer.domElement);
            previewControls.enableDamping = true;
            previewControls.dampingFactor = 0.05;
            previewControls.autoRotate = true;
            previewControls.autoRotateSpeed = 1;
            
            try {
                await loadPreviewModel(index);
            } catch (error) {
                console.error('预览模型加载失败:', error);
            }
            
            animatePreview();
        }

        // 加载预览模型
        async function loadPreviewModel(index) {
            const modelUrl = MODELS[index].url;
            return new Promise((resolve, reject) => {
                const loader = new GLTFLoader();
                loader.load(
                    modelUrl,
                    (gltf) => {
                        const model = gltf.scene;
                        
                        const box = new THREE.Box3().setFromObject(model);
                        const center = box.getCenter(new THREE.Vector3());
                        const size = box.getSize(new THREE.Vector3());
                        const maxDim = Math.max(size.x, size.y, size.z);
                        
                        model.position.sub(center);
                        const scale = 2 / maxDim;
                        model.scale.setScalar(scale);
                        
                        previewScene.add(model);
                        resolve();
                    },
                    undefined,
                    (error) => reject(error)
                );
            });
        }

        // 预览渲染循环
        function animatePreview() {
            if (!previewScene || !previewCamera || !previewRenderer) return;
            
            previewControls.update();
            previewRenderer.render(previewScene, previewCamera);
            requestAnimationFrame(animatePreview);
        }

        // 窗口调整
        function onWindowResize(index, container) {
            if (!cameras[index] || !renderers[index]) return;
            
            cameras[index].aspect = container.clientWidth / container.clientHeight;
            cameras[index].updateProjectionMatrix();
            renderers[index].setSize(container.clientWidth, container.clientHeight);
        }

        // 动画循环
        function animate() {
            animationId = requestAnimationFrame(animate);
            
            scenes.forEach((scene, index) => {
                if (controls[index]) {
                    controls[index].update();
                }
                if (renderers[index] && cameras[index]) {
                    renderers[index].render(scene, cameras[index]);
                }
            });
        }

        // 初始化所有卡片
        function initAllCards() {
            const galleryGrid = document.getElementById('galleryGrid');
            
            MODELS.forEach((model, index) => {
                const card = createCard(model, index);
                galleryGrid.appendChild(card);
            });
            
            setTimeout(() => {
                MODELS.forEach((model, index) => {
                    initScene(index, model.url);
                });
                animate();
            }, 100);
        }

        // 启动
        createStars();
        initAllCards();
    </script>
</body>
</html>
