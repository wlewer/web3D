<!DOCTYPE html>
<html lang="zh-CN">
<head>
	<meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web3D - 3D Gaussian Splatting 展示</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background: linear-gradient(135deg, #0f0f23 0%, #1a1a2e 50%, #16213e 100%);
            min-height: 100vh;
            color: white;
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            overflow-x: hidden;
        }

        /* 头部标题 */
        .header {
            text-align: center;
            padding: 40px 20px 20px;
            background: rgba(15, 15, 35, 0.5);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(102, 126, 234, 0.2);
        }

        .header h1 {
            font-size: 2.5rem;
            font-weight: 700;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 10px;
            text-shadow: 0 2px 10px rgba(102, 126, 234, 0.3);
        }

        .header p {
            font-size: 1.1rem;
            color: rgba(255, 255, 255, 0.7);
            max-width: 600px;
            margin: 0 auto;
            line-height: 1.6;
        }

        /* 主网格容器 */
        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            grid-template-rows: repeat(2, 1fr);
            gap: 16px;
            padding: 20px;
            max-width: 1600px;
            margin: 0 auto;
            height: calc(100vh - 200px);
            min-height: 600px;
        }

        /* 卡片包装器 */
        .gallery-card-wrapper {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 12px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            transition: all 0.3s ease;
            position: relative;
            min-height: 0;
        }

        .gallery-card-wrapper:hover {
            border-color: rgba(102, 126, 234, 0.3);
            box-shadow: 0 4px 20px rgba(102, 126, 234, 0.15);
            transform: translateY(-2px);
        }

        /* 3D 画布容器 */
        .gallery-card-3d {
            flex: 1;
            position: relative;
            min-height: 0;
            width: 100%;
            height: 100%;
        }

        .gallery-card-3d canvas {
            width: 100% !important;
            height: 100% !important;
            display: block;
        }

        /* 卡片信息栏 */
        .card-info {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 24px 12px 10px;
            background: linear-gradient(transparent, rgba(0, 0, 0, 0.75));
            z-index: 5;
            pointer-events: none;
        }

        .card-title {
            font-size: 14px;
            font-weight: 600;
            color: white;
            margin-bottom: 4px;
            text-shadow: 0 1px 3px rgba(0, 0, 0, 0.5);
        }

        .card-tag {
            display: inline-block;
            font-size: 11px;
            padding: 2px 8px;
            background: rgba(102, 126, 234, 0.3);
            border-radius: 10px;
            color: rgba(255, 255, 255, 0.9);
        }

        /* FPS 显示 */
        .fps-counter {
            position: absolute;
            top: 10px;
            right: 10px;
            padding: 4px 8px;
            background: rgba(0, 0, 0, 0.5);
            border-radius: 6px;
            font-size: 11px;
            color: #667eea;
            font-weight: 600;
            z-index: 10;
            backdrop-filter: blur(4px);
        }

        /* 加载提示 */
        .loading-overlay {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(0, 0, 0, 0.3);
            z-index: 8;
            transition: opacity 0.3s;
        }

        .loading-overlay.hidden {
            opacity: 0;
            pointer-events: none;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(102, 126, 234, 0.2);
            border-top-color: #667eea;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* 底部提示 */
        .footer-hint {
            text-align: center;
            padding: 15px;
            color: rgba(255, 255, 255, 0.4);
            font-size: 13px;
            background: rgba(0, 0, 0, 0.2);
        }

        /* 响应式 */
        @media (max-width: 1200px) {
            .gallery-grid {
                grid-template-columns: repeat(2, 1fr);
                grid-template-rows: repeat(3, 1fr);
            }
        }

        @media (max-width: 768px) {
            .header h1 {
                font-size: 1.8rem;
            }
            .header p {
                font-size: 0.95rem;
            }
            .gallery-grid {
                grid-template-columns: 1fr;
                grid-template-rows: repeat(6, 1fr);
                height: calc(100vh - 180px);
            }
        }
    </style>
</head>
<body>
    <!-- 头部 -->
    <div class="header">
        <h1>🚀 Web3D - 3D Gaussian Splatting</h1>
        <p>高性能 3D 高斯泼溅渲染引擎 | 支持 SPZ / SPLAT / GLB 格式 | 智能居中算法</p>
    </div>

    <!-- 6 个 3D 模型卡片网格 -->
    <div class="gallery-grid" id="galleryGrid">
        <!-- 卡片将通过 JavaScript 动态生成 -->
    </div>

    <!-- 底部提示 -->
    <div class="footer-hint">
        💡 拖拽旋转 · 滚轮缩放 · 右键平移 | Powered by Three.js + Spark Renderer
    </div>

    <!-- Import Map for Three.js -->
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.180.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.180.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

        // 6 个示例模型数据（从画廊精选）
        const MODELS = [
            {
                id: 'butterfly',
                title: '🦋 Butterfly 3DGS',
                tag: '昆虫',
                url: 'https://sparkjs.dev/assets/splats/butterfly.spz'
            },
            {
                id: 'fly',
                title: '🪰 Fly 3DGS',
                tag: '微观',
                url: 'https://sparkjs.dev/assets/splats/fly.spz'
            },
            {
                id: 'burger',
                title: '🍔 Amboy Burger',
                tag: '美食',
                url: 'https://sparkjs.dev/assets/splats/food/burger-from-amboy.spz'
            },
            {
                id: 'fish',
                title: '🐟 Branzino Fish',
                tag: '海鲜',
                url: 'https://sparkjs.dev/assets/splats/food/branzino-amarin.spz'
            },
            {
                id: 'dessert',
                title: '🍰 Dessert 3DGS',
                tag: '甜点',
                url: 'https://sparkjs.dev/assets/splats/dessert.spz'
            },
            {
                id: 'caviar',
                title: '🦪 Caviar 3DGS',
                tag: '超精细',
                url: 'https://sparkjs.dev/assets/splats/food/clams-and-caviar-by-ikoyi.spz'
            }
        ];

        // 全局变量
        let scenes = [];
        let cameras = [];
        let renderers = [];
        let controls = [];
        let fpsCounters = [];
        let frameCounts = [];
        let lastTimes = [];

        // 初始化所有卡片
        function initAllCards() {
            const grid = document.getElementById('galleryGrid');
            
            MODELS.forEach((model, index) => {
                // 创建卡片 DOM
                const card = createCard(model, index);
                grid.appendChild(card);
                
                // 初始化 3D 场景
                setTimeout(() => {
                    initScene(index, model.url);
                }, index * 200); //  staggered loading
            });
        }

        // 创建卡片 DOM
        function createCard(model, index) {
            const wrapper = document.createElement('div');
            wrapper.className = 'gallery-card-wrapper';
            wrapper.id = `card-${index}`;
            
            wrapper.innerHTML = `
                <div class="gallery-card-3d" id="canvas-${index}"></div>
                <div class="fps-counter" id="fps-${index}">-- FPS</div>
                <div class="loading-overlay" id="loading-${index}">
                    <div class="spinner"></div>
                </div>
                <div class="card-info">
                    <div class="card-title">${model.title}</div>
                    <span class="card-tag">${model.tag}</span>
                </div>
            `;
            
            return wrapper;
        }

        // 初始化单个场景
        async function initScene(index, modelUrl) {
            const container = document.getElementById(`canvas-${index}`);
            const loadingOverlay = document.getElementById(`loading-${index}`);
            const fpsCounter = document.getElementById(`fps-${index}`);
            
            if (!container) return;

            // 场景
            const scene = new THREE.Scene();
            scene.background = new THREE.Color(0x0f0f23);
            scenes[index] = scene;

            // 相机
            const camera = new THREE.PerspectiveCamera(
                50,
                container.clientWidth / container.clientHeight,
                0.1,
                1000
            );
            camera.position.set(0, 0.6, 4);
            cameras[index] = camera;

            // 渲染器
            const renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(container.clientWidth, container.clientHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            container.appendChild(renderer.domElement);
            renderers[index] = renderer;

            // 控制器
            const orbitControls = new OrbitControls(camera, renderer.domElement);
            orbitControls.enableDamping = true;
            orbitControls.dampingFactor = 0.05;
            orbitControls.target.set(0, 0, 0);
            orbitControls.enabled = true;
            orbitControls.minDistance = 0.5;
            orbitControls.maxDistance = 20;
            orbitControls.autoRotate = true;
            orbitControls.autoRotateSpeed = 0.5;
            controls[index] = orbitControls;

            // FPS 计数器
            frameCounts[index] = 0;
            lastTimes[index] = performance.now();

            // 加载模型
            try {
                await loadModel(index, modelUrl, scene);
                
                // 隐藏加载层
                setTimeout(() => {
                    loadingOverlay.classList.add('hidden');
                }, 500);
            } catch (error) {
                console.error(`❌ 模型 ${index} 加载失败:`, error);
                loadingOverlay.innerHTML = '<div style="color: #ff6b6b; font-size: 12px;">加载失败</div>';
            }

            // 开始渲染循环
            animate(index);

            // 响应式
            window.addEventListener('resize', () => {
                onWindowResize(index, container);
            });
        }

        // 加载模型
        async function loadModel(index, modelUrl, scene) {
            if (modelUrl.endsWith('.spz') || modelUrl.endsWith('.splat')) {
                await loadSplatModel(index, modelUrl, scene);
            } else if (modelUrl.endsWith('.glb') || modelUrl.endsWith('.gltf')) {
                await loadGLBModel(index, modelUrl, scene);
            }
        }

        // 加载 SPZ/SPLAT 模型
        async function loadSplatModel(index, modelUrl, scene) {
            // 注意：这里需要引入 spark-renderer 或自定义加载器
            // 由于是纯 HTML 演示，我们使用简化的点云加载
            console.log(`⏳ 加载 SPZ 模型 ${index}: ${modelUrl}`);
            
            // TODO: 实际项目中应使用 SparkRenderer 的 SplatLoader
            // 这里仅作为占位符
        }

        // 加载 GLB 模型
        async function loadGLBModel(index, modelUrl, scene) {
            return new Promise((resolve, reject) => {
                const loader = new GLTFLoader();
                loader.load(
                    modelUrl,
                    (gltf) => {
                        const model = gltf.scene;
                        
                        // 智能居中
                        const box = new THREE.Box3().setFromObject(model);
                        const center = box.getCenter(new THREE.Vector3());
                        const size = box.getSize(new THREE.Vector3());
                        const maxDim = Math.max(size.x, size.y, size.z);
                        
                        // 居中并缩放
                        model.position.sub(center);
                        const scale = 2 / maxDim;
                        model.scale.setScalar(scale);
                        
                        scene.add(model);
                        resolve();
                    },
                    undefined,
                    (error) => reject(error)
                );
            });
        }

        // 动画循环
        function animate(index) {
            requestAnimationFrame(() => animate(index));
            
            const controls = window.controls && window.controls[index];
            const renderer = window.renderers && window.renderers[index];
            const scene = window.scenes && window.scenes[index];
            const camera = window.cameras && window.cameras[index];
            const fpsCounter = document.getElementById(`fps-${index}`);
            
            if (controls) controls.update();
            if (renderer && scene && camera) {
                renderer.render(scene, camera);
            }
            
            // 更新 FPS
            updateFPS(index, fpsCounter);
        }

        // 更新 FPS
        function updateFPS(index, fpsCounter) {
            frameCounts[index]++;
            const now = performance.now();
            const delta = now - lastTimes[index];
            
            if (delta >= 1000) {
                const fps = Math.round((frameCounts[index] * 1000) / delta);
                if (fpsCounter) {
                    fpsCounter.textContent = `${fps} FPS`;
                }
                frameCounts[index] = 0;
                lastTimes[index] = now;
            }
        }

        // 窗口调整
        function onWindowResize(index, container) {
            const camera = cameras[index];
            const renderer = renderers[index];
            
            if (!camera || !renderer) return;
            
            camera.aspect = container.clientWidth / container.clientHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(container.clientWidth, container.clientHeight);
        }

        // 启动
        initAllCards();
    </script>
</body>
</html>
