user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
    use epoll;
    multi_accept on;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # 日志格式
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for" '
                    'rt=$request_time uct="$upstream_connect_time" '
                    'uht="$upstream_header_time" urt="$upstream_response_time"';

    access_log /var/log/nginx/access.log main;

    # 基本性能优化
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    client_max_body_size 100M;
    server_tokens off;

    # ═══════════════════════════════════════════════════════════════
    # Gzip 压缩配置
    # ═══════════════════════════════════════════════════════════════
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/javascript
        application/json
        application/xml+rss
        application/atom+xml
        image/svg+xml
        application/wasm;

    # ═══════════════════════════════════════════════════════════════
    # SSL 全局配置
    # ═══════════════════════════════════════════════════════════════
    # 证书路径占位符 —— 使用前请替换为真实证书路径
    # 开发环境：使用 backend/nginx/ssl/ 下的自签名证书
    # 生产环境：使用 Let's Encrypt 证书（/etc/letsencrypt/live/your-domain/）
    ssl_certificate /etc/nginx/ssl/server.crt;
    ssl_certificate_key /etc/nginx/ssl/server.key;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384';
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # ═══════════════════════════════════════════════════════════════
    # 上游服务定义
    # ═══════════════════════════════════════════════════════════════
    upstream backend_api {
        server web3d-backend:8000;
        keepalive 32;
    }

    # 开发模式：Vite dev server 上游
    upstream frontend_dev {
        server host.docker.internal:5173;
        keepalive 32;
    }

    # ═══════════════════════════════════════════════════════════════
    # HTTP → HTTPS 重定向
    # ═══════════════════════════════════════════════════════════════
    server {
        listen 80;
        listen [::]:80;
        server_name _;

        # ACME challenge for Let's Encrypt (保留此路径以便自动续期)
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ═══════════════════════════════════════════════════════════════
    # HTTPS 主服务
    # ═══════════════════════════════════════════════════════════════
    server {
        listen 443 ssl http2;
        listen [::]:443 ssl http2;
        server_name _;

        # ── 安全头部 ──
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

        # HSTS (生产环境启用，开发环境可注释)
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

        # ── 根路径：前端服务 ──
        # 模式A：生产模式 —— Nginx 直接服务构建后的静态文件
        # 用法：构建前端后将 dist/ 挂载到 /usr/share/nginx/html
        location / {
            root /usr/share/nginx/html;
            index index.html;
            try_files $uri $uri/ /index.html;

            # HTML 文件不缓存（确保应用更新立即生效）
            location ~* \.html$ {
                add_header Cache-Control "no-cache, no-store, must-revalidate" always;
                add_header Pragma "no-cache" always;
                expires off;
            }

            # JS/CSS 文件长期缓存（文件名含 hash）
            location ~* \.(js|css)$ {
                add_header Cache-Control "public, max-age=31536000, immutable" always;
                expires 1y;
            }
        }

        # 模式B：开发模式 —— Nginx 反向代理到 Vite dev server
        # 如需使用开发模式，请注释掉上面的 location / 块，并取消下面块的注释：
        # location / {
        #     proxy_pass http://frontend_dev;
        #     proxy_http_version 1.1;
        #     proxy_set_header Host $host;
        #     proxy_set_header X-Real-IP $remote_addr;
        #     proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        #     proxy_set_header X-Forwarded-Proto $scheme;
        #
        #     # WebSocket 支持（Vite HMR 需要）
        #     proxy_set_header Upgrade $http_upgrade;
        #     proxy_set_header Connection "upgrade";
        # }

        # ── API 代理到后端 ──
        location /api/ {
            proxy_pass http://backend_api/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # 代理超时（AI 生成任务耗时较长）
            proxy_connect_timeout 120s;
            proxy_send_timeout 120s;
            proxy_read_timeout 120s;

            # WebSocket 升级支持（为未来实时通知做准备）
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }

        # ── 后端静态文件代理 ──
        location /app/ {
            proxy_pass http://backend_api/app/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 120s;
        }

        location /generation-models/ {
            proxy_pass http://backend_api/generation-models/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 120s;

            # 3D 模型文件缓存 7 天
            add_header Cache-Control "public, max-age=604800" always;
            expires 7d;
        }

        location /static-models/ {
            proxy_pass http://backend_api/static-models/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 120s;

            # 3D 模型文件缓存 7 天
            add_header Cache-Control "public, max-age=604800" always;
            expires 7d;
        }

        location /models/ {
            proxy_pass http://backend_api/static-models/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 120s;

            # 3D 模型文件缓存 7 天
            add_header Cache-Control "public, max-age=604800" always;
            expires 7d;
        }

        # ── 直接托管的静态资源（生产模式前端构建产物）──
        # 图片缓存 30 天
        location ~* \.(jpg|jpeg|png|gif|ico|webp|svg)$ {
            root /usr/share/nginx/html;
            add_header Cache-Control "public, max-age=2592000" always;
            expires 30d;
            access_log off;
        }

        # 字体文件缓存 30 天
        location ~* \.(woff|woff2|ttf|otf|eot)$ {
            root /usr/share/nginx/html;
            add_header Cache-Control "public, max-age=2592000" always;
            expires 30d;
            access_log off;
        }

        # WASM 文件缓存 7 天
        location ~* \.wasm$ {
            root /usr/share/nginx/html;
            add_header Cache-Control "public, max-age=604800" always;
            expires 7d;
            access_log off;
        }

        # PLY/SPZ/GLB 模型文件缓存 7 天
        location ~* \.(ply|spz|glb|gltf|splat)$ {
            root /usr/share/nginx/html;
            add_header Cache-Control "public, max-age=604800" always;
            expires 7d;
            access_log off;
        }

        # ── 健康检查 ──
        location /nginx-health {
            access_log off;
            return 200 "healthy\n";
            add_header Content-Type text/plain;
        }
    }
}
