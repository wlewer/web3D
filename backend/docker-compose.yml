name: web3d

services:
  # Web3D Backend API
  web3d-backend:
    build: .
    container_name: web3d-backend
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://web3d_user:web3d_password_2025@web3d-postgres:5432/web3d
      - REDIS_URL=redis://:redis_password_2025@web3d-redis:6379/0
      - SECRET_KEY=web3d-secret-key-change-in-production-min-32-chars
      - DEBUG=false
      - ENVIRONMENT=production
    depends_on:
      web3d-postgres:
        condition: service_healthy
      web3d-redis:
        condition: service_healthy
    networks:
      - web3d-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # PostgreSQL 数据库（Web3D专用）
  web3d-postgres:
    image: postgres:16-alpine
    container_name: web3d-postgres
    environment:
      POSTGRES_DB: web3d
      POSTGRES_USER: web3d_user
      POSTGRES_PASSWORD: web3d_password_2025
    ports:
      - "25432:5432"
    volumes:
      - web3d_postgres_data:/var/lib/postgresql/data
      - ./database/init_database.sql:/docker-entrypoint-initdb.d/01-init.sql
    networks:
      - web3d-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U web3d_user -d web3d"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # Redis 缓存（Web3D专用）
  web3d-redis:
    image: redis:7-alpine
    container_name: web3d-redis
    command: redis-server --requirepass redis_password_2025 --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - "26379:6379"
    volumes:
      - web3d_redis_data:/data
    networks:
      - web3d-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "redis_password_2025", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  # MinIO 对象存储（Web3D专用）
  web3d-minio:
    image: minio/minio:latest
    container_name: web3d-minio
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minio_password_2025
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - web3d_minio_data:/data
    command: server /data --console-address ":9001"
    networks:
      - web3d-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # Nginx 反向代理 + HTTPS 统一入口
  web3d-nginx:
    build:
      context: ./nginx
      dockerfile: Dockerfile.nginx
    container_name: web3d-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      # 挂载 Nginx 配置（开发调试用，生产环境配置已打包进镜像）
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      # 挂载 SSL 证书目录
      - ./nginx/ssl:/etc/nginx/ssl:ro
      # ACME challenge 目录（Let's Encrypt 验证）
      - ./nginx/certbot:/var/www/certbot:ro
      # 生产模式：挂载前端构建后的静态文件（dist 目录）
      # 开发模式：注释掉下面这行，并在 nginx.conf 中启用前端开发代理
      - ../src/web-frontend/dist:/usr/share/nginx/html:ro
    depends_on:
      web3d-backend:
        condition: service_healthy
    networks:
      - web3d-network
    restart: unless-stopped

volumes:
  web3d_postgres_data:
    driver: local
  web3d_redis_data:
    driver: local
  web3d_minio_data:
    driver: local

networks:
  web3d-network:
    driver: bridge
    name: web3d-network
