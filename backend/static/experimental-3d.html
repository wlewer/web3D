<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🧪 AI 3D生成实验</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f0f2f5;
            height: 100vh;
            overflow: hidden;
        }
        
        .main-layout {
            display: flex;
            flex-direction: column;
            height: 100vh;
            gap: 8px;
            padding: 8px;
        }
        
        /* 顶部模型选择栏 */
        .top-modes-bar {
            background: white;
            border-radius: 8px;
            padding: 10px 16px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            flex-shrink: 0;
        }
        
        .top-modes-title {
            font-size: 13px;
            font-weight: 600;
            color: #333;
            margin-bottom: 8px;
        }
        
        .modes-row {
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            gap: 8px;
        }
        
        .mode-chip {
            padding: 10px 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
            background: white;
            display: flex;
            flex-direction: column;
            gap: 6px;
            position: relative;
            min-height: 80px;
        }
        
        .mode-chip:hover {
            border-color: #667eea;
            background: #f8f9ff;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.15);
        }
        
        .mode-chip.active {
            border-color: #667eea;
            background: linear-gradient(135deg, rgba(102, 126, 234, 0.15) 0%, rgba(118, 75, 162, 0.1) 100%);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.3);
        }
        
        .mode-chip.active::after {
            content: '✓';
            position: absolute;
            top: 6px;
            right: 6px;
            width: 18px;
            height: 18px;
            background: #667eea;
            color: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 11px;
            font-weight: bold;
        }
        
        .mode-chip-icon {
            display: none;
        }
        
        .mode-chip-info {
            flex: 1;
            min-width: 0;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }
        
        .mode-chip-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 4px;
            margin-bottom: 0;
        }
        
        .mode-chip-label {
            font-weight: 600;
            color: #333;
            font-size: 12px;
            white-space: nowrap;
        }
        
        .mode-chip-github {
            color: #999;
            text-decoration: none;
            font-size: 9px;
            padding: 2px 4px;
            border-radius: 3px;
            background: #f5f5f5;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 2px;
            flex-shrink: 0;
        }
        
        .mode-chip-github:hover {
            color: #667eea;
            background: #e8eaff;
        }
        
        .mode-chip-github svg {
            width: 10px;
            height: 10px;
        }
        
        .mode-chip-desc {
            font-size: 9px;
            color: #666;
            line-height: 1.3;
            margin-bottom: 0;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        
        .mode-chip-badges {
            display: flex;
            gap: 4px;
            flex-wrap: wrap;
        }
        
        .mode-chip-badge {
            display: inline-block;
            padding: 2px 5px;
            border-radius: 6px;
            font-size: 8px;
            font-weight: 600;
        }
        
        .badge-free {
            background: #d4edda;
            color: #155724;
        }
        
        .badge-fast {
            background: #fff3cd;
            color: #856404;
        }
        
        .badge-gpu {
            background: #d1ecf1;
            color: #0c5460;
        }
        
        .badge-cloud {
            background: #f8d7da;
            color: #721c24;
        }
        
        /* 主内容区域 */
        .content-area {
            flex: 1;
            display: grid;
            grid-template-columns: 400px 1fr;
            gap: 12px;
            overflow: hidden;
        }
        
        /* 左侧面板 */
        .left-panel {
            background: white;
            border-radius: 12px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            overflow: hidden;
        }
        
        .panel-title {
            font-size: 16px;
            font-weight: 600;
            color: #333;
            padding-bottom: 10px;
            border-bottom: 2px solid #667eea;
            flex-shrink: 0;
        }
        
        /* 上传区域 */
        .upload-area {
            border: 2px dashed #ccc;
            border-radius: 8px;
            padding: 20px 16px;
            text-align: center;
            transition: all 0.2s;
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 10px;
            min-height: 0;
            overflow: hidden;
        }
        
        .upload-area.dragover {
            border-color: #667eea;
            background: rgba(102, 126, 234, 0.05);
        }
        
        .upload-hint {
            font-size: 13px;
            color: #666;
            margin-bottom: 6px;
        }
        
        #imageInput {
            display: none;
        }
        
        .btn-upload {
            padding: 10px 24px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .btn-upload:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.3);
        }
        
        .btn-upload:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }
        
        .preview-image {
            max-width: 100%;
            max-height: 180px;
            object-fit: contain;
            border-radius: 8px;
            margin-top: 6px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        
        /* 进度条 */
        .progress-area {
            display: none;
        }
        
        .progress-bar-container {
            background: #e0e0e0;
            border-radius: 6px;
            height: 24px;
            overflow: hidden;
        }
        
        .progress-bar {
            height: 100%;
            background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
            transition: width 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 12px;
            font-weight: 600;
        }
        
        .status-text {
            text-align: center;
            font-size: 13px;
            color: #666;
            margin-top: 8px;
        }
        
        /* 右侧预览区 */
        .right-panel {
            background: white;
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            overflow: hidden;
        }
        
        .preview-header {
            padding: 16px 20px;
            border-bottom: 1px solid #e0e0e0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .preview-title {
            font-size: 16px;
            font-weight: 600;
            color: #333;
        }
        
        .btn-download {
            padding: 8px 16px;
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
            color: white;
            text-decoration: none;
            border-radius: 6px;
            font-size: 13px;
            font-weight: 600;
            transition: all 0.2s;
            display: none;
        }
        
        .btn-download:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(17, 153, 142, 0.3);
        }
        
        .model-viewer-container {
            flex: 1;
            position: relative;
            background: #fafafa;
        }
        
        model-viewer {
            width: 100%;
            height: 100%;
            display: block;
        }
        
        .empty-state {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            color: #999;
            pointer-events: none;
        }
        
        .empty-icon {
            font-size: 64px;
            margin-bottom: 16px;
        }
        
        .empty-text {
            font-size: 16px;
        }
        
        /* 消息提示 */
        .error-message, .success-message {
            padding: 10px;
            border-radius: 6px;
            font-size: 13px;
            display: none;
        }
        
        .error-message {
            background: #fee;
            color: #c33;
        }
        
        .success-message {
            background: #efe;
            color: #3c3;
        }
    </style>
</head>
<body>
    <div class="main-layout">
        <!-- 顶部模型选择栏 -->
        <div class="top-modes-bar">
            <div class="top-modes-title">选择生成模式：</div>
            <div class="modes-row" id="modeRow">
                <!-- 模式按钮将通过JS动态生成 -->
            </div>
        </div>
        
        <!-- 主内容区域 -->
        <div class="content-area">
            <!-- 左侧面板 -->
            <div class="left-panel">
                <div class="panel-title">⚙️ 生成配置</div>
                
                <div id="errorMessage" class="error-message"></div>
                <div id="successMessage" class="success-message"></div>
                
                <!-- 上传区域 -->
                <div style="flex: 1; display: flex; flex-direction: column; gap: 10px; min-height: 0;">
                    <div style="font-size: 13px; color: #666; flex-shrink: 0;">上传图片：</div>
                    <div class="upload-area" id="uploadArea">
                        <div class="upload-hint">拖拽图片到此处，或点击上传</div>
                        <input type="file" id="imageInput" accept="image/*">
                        <button class="btn-upload" onclick="document.getElementById('imageInput').click()" style="flex-shrink: 0;">
                            选择图片
                        </button>
                        <img id="previewImage" class="preview-image" style="display: none;">
                    </div>
                </div>
                
                <!-- 开始按钮 -->
                <button class="btn-upload" id="startBtn" onclick="startGeneration()" disabled style="width: 100%; flex-shrink: 0;">
                    🚀 开始生成
                </button>
                
                <!-- 进度显示 -->
                <div class="progress-area" id="progressArea" style="flex-shrink: 0;">
                    <div class="progress-bar-container">
                        <div class="progress-bar" id="progressBar" style="width: 0%">0%</div>
                    </div>
                    <div class="status-text" id="statusText">正在准备...</div>
                </div>
            </div>
            
            <!-- 右侧预览区 -->
            <div class="right-panel">
                <div class="preview-header">
                    <div class="preview-title">📦 3D模型预览</div>
                    <a class="btn-download" id="downloadBtn" href="#" download>
                        ⬇️ 下载GLB
                    </a>
                </div>
                
                <div class="model-viewer-container">
                    <div class="empty-state" id="emptyState">
                        <div class="empty-icon">🎨</div>
                        <div class="empty-text">上传图片并点击"开始生成"</div>
                    </div>
                    
                    <model-viewer 
                        id="modelViewer"
                        style="display: none;"
                        camera-controls 
                        auto-rotate
                        shadow-intensity="1"
                        environment-image="neutral"
                        auto-rotate-delay="0"
                        rotation-per-second="30deg"
                        interaction-prompt="auto"
                        loading="eager"
                        reveal="auto"
                        ar>
                    </model-viewer>
                </div>
            </div>
        </div>
    </div>
    
    <!-- 离线模式：使用本地model-viewer库（不依赖CDN） -->
    <script type="module" src="/app/model-viewer.min.js"></script>
    
    <script>
        const API_BASE = '/api/v1';
        let currentMode = 'hunyuan3d';
        let currentTaskId = null;
        let selectedFile = null;
        
        // 6种生成模式配置
        const MODES = [
            {
                id: 'hunyuan3d',
                icon: '🌟',
                label: 'Hunyuan3D',
                desc: '腾讯高质量3D生成，支持纹理',
                github: 'https://github.com/Tencent-Hunyuan/Hunyuan3D-2',
                badges: [
                    { text: '高质量', class: 'badge-gpu' },
                    { text: 'GPU', class: 'badge-gpu' }
                ],
                endpoint: '/generation/upload',
                mockTime: 5000
            },
            {
                id: 'sf3d',
                icon: '🚀',
                label: 'SF3D',
                desc: 'Stability AI极速生成(~0.5秒)',
                github: 'https://github.com/Stability-AI/generative-models',
                badges: [
                    { text: '极速', class: 'badge-fast' },
                    { text: '9GB', class: 'badge-gpu' }
                ],
                endpoint: '/generation/sf3d/upload',
                mockTime: 500
            },
            {
                id: 'triposr',
                icon: '⚡',
                label: 'TripoSR',
                desc: 'VAST-AI超快概念验证(<1秒)',
                github: 'https://github.com/VAST-AI-Research/TripoSR',
                badges: [
                    { text: '<1秒', class: 'badge-fast' },
                    { text: '4-6GB', class: 'badge-gpu' }
                ],
                endpoint: '/generation/triposr/upload',
                mockTime: 800
            },
            {
                id: 'instantmesh',
                icon: '🔷',
                label: 'InstantMesh',
                desc: '腾讯ARC精细网格生成',
                github: 'https://github.com/TencentARC/InstantMesh',
                badges: [
                    { text: '高质量', class: 'badge-gpu' },
                    { text: '8-12GB', class: 'badge-gpu' }
                ],
                endpoint: '/generation/instantmesh/upload',
                mockTime: 15000
            },
            {
                id: 'triposr_cpu',
                icon: '💻',
                label: 'TripoSR CPU',
                desc: '本地CPU版本，无需GPU',
                github: 'https://github.com/VAST-AI-Research/TripoSR',
                badges: [
                    { text: '免费', class: 'badge-free' },
                    { text: 'CPU', class: 'badge-free' }
                ],
                endpoint: '/experimental/triposr/cpu/upload',
                mockTime: 5000
            },
            {
                id: 'huggingface',
                icon: '☁️',
                label: 'HuggingFace',
                desc: '云端API，免费额度',
                github: 'https://huggingface.co/spaces',
                badges: [
                    { text: '快速', class: 'badge-cloud' },
                    { text: '云端', class: 'badge-cloud' }
                ],
                endpoint: '/experimental/huggingface/upload',
                mockTime: 10000
            }
        ];
        
        function checkAuth() {
            const token = localStorage.getItem('access_token');
            if (!token) {
                window.location.href = '/login.html';
                return false;
            }
            return true;
        }
        
        window.addEventListener('load', () => {
            if (!checkAuth()) return;
            renderModes();
        });
        
        function renderModes() {
            const row = document.getElementById('modeRow');
            row.innerHTML = MODES.map(mode => `
                <div class="mode-chip ${mode.id === currentMode ? 'active' : ''}" 
                     onclick="selectMode('${mode.id}')"
                     data-mode="${mode.id}">
                    <div class="mode-chip-icon">${mode.icon}</div>
                    <div class="mode-chip-info">
                        <div class="mode-chip-header">
                            <div class="mode-chip-label">${mode.label}</div>
                            <a href="${mode.github}" target="_blank" class="mode-chip-github" onclick="event.stopPropagation()">
                                <svg viewBox="0 0 16 16" fill="currentColor">
                                    <path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"/>
                                </svg>
                                GitHub
                            </a>
                        </div>
                        <div class="mode-chip-desc">${mode.desc}</div>
                        <div class="mode-chip-badges">
                            ${mode.badges.map(b => `<span class="mode-chip-badge ${b.class}">${b.text}</span>`).join('')}
                        </div>
                    </div>
                </div>
            `).join('');
        }
        
        function selectMode(modeId) {
            currentMode = modeId;
            
            document.querySelectorAll('.mode-chip').forEach(chip => {
                chip.classList.remove('active');
            });
            document.querySelector(`[data-mode="${modeId}"]`).classList.add('active');
        }
        
        document.getElementById('imageInput').addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) {
                selectedFile = file;
                
                const reader = new FileReader();
                reader.onload = (event) => {
                    const previewImage = document.getElementById('previewImage');
                    previewImage.src = event.target.result;
                    previewImage.style.display = 'block';
                };
                reader.readAsDataURL(file);
                
                document.getElementById('startBtn').disabled = false;
            }
        });
        
        // 拖拽上传
        const uploadArea = document.getElementById('uploadArea');
        
        uploadArea.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadArea.classList.add('dragover');
        });
        
        uploadArea.addEventListener('dragleave', () => {
            uploadArea.classList.remove('dragover');
        });
        
        uploadArea.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadArea.classList.remove('dragover');
            
            const file = e.dataTransfer.files[0];
            if (file && file.type.startsWith('image/')) {
                document.getElementById('imageInput').files = e.dataTransfer.files;
                document.getElementById('imageInput').dispatchEvent(new Event('change'));
            }
        });
        
        async function startGeneration() {
            if (!selectedFile) {
                showError('请先选择图片');
                return;
            }
            
            const mode = MODES.find(m => m.id === currentMode);
            if (!mode) {
                showError('无效的生成模式');
                return;
            }
            
            const startBtn = document.getElementById('startBtn');
            startBtn.disabled = true;
            startBtn.textContent = '🔄 生成中...';
            
            document.getElementById('progressArea').style.display = 'block';
            updateProgress(0, '正在上传图片...');
            
            try {
                const formData = new FormData();
                formData.append('file', selectedFile);
                
                const response = await fetch(`${API_BASE}${mode.endpoint}`, {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${localStorage.getItem('access_token')}`
                    },
                    body: formData
                });
                
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}: ${await response.text()}`);
                }
                
                const result = await response.json();
                currentTaskId = result.uid || result.task_id;
                
                console.log('[Experimental] Task submitted:', currentTaskId);
                showSuccess('任务已提交，正在生成3D模型...');
                
                // 真实轮询后端任务状态
                pollRealProgress();
                
            } catch (error) {
                console.error('Generation error:', error);
                showError('生成失败：' + error.message);
                startBtn.disabled = false;
                startBtn.textContent = '🚀 开始生成';
            }
        }
        
        // 真实轮询后端任务状态
        async function pollRealProgress() {
            const pollInterval = 2000; // 每2秒轮询一次
            const maxAttempts = 300; // 最多轮询10分钟
            let attempts = 0;
            
            const poll = async () => {
                try {
                    attempts++;
                    if (attempts > maxAttempts) {
                        throw new Error('生成超时，请重试');
                    }
                    
                    const response = await fetch(`${API_BASE}/experimental/status/${currentTaskId}`, {
                        headers: {
                            'Authorization': `Bearer ${localStorage.getItem('access_token')}`
                        }
                    });
                    
                    if (!response.ok) {
                        throw new Error(`查询状态失败: HTTP ${response.status}`);
                    }
                    
                    const status = await response.json();
                    console.log('[Experimental] Task status:', status);
                    
                    // 更新进度
                    const progress = status.progress || 0;
                    const message = status.message || '处理中...';
                    updateProgress(progress, message);
                    
                    if (status.status === 'completed') {
                        // 生成完成，显示结果
                        updateProgress(100, '生成完成！');
                        await showResult();
                        return;
                    } else if (status.status === 'failed') {
                        throw new Error(status.message || '生成失败');
                    }
                    
                    // 继续轮询
                    setTimeout(poll, pollInterval);
                    
                } catch (error) {
                    console.error('[Experimental] Poll error:', error);
                    showError('查询进度失败：' + error.message);
                    resetUI();
                }
            };
            
            // 开始轮询
            poll();
        }
        
        // 旧的模拟进度函数（保留备用）
        function pollProgress(mockTime) {
            const interval = setInterval(() => {
                updateProgress(
                    Math.min(95, parseInt(document.getElementById('progressBar').textContent) + 5),
                    '正在生成3D模型...'
                );
            }, mockTime / 20);
            
            setTimeout(async () => {
                clearInterval(interval);
                updateProgress(100, '生成完成！');
                await showResult();
            }, mockTime);
        }
        
        function updateProgress(progress, message) {
            const progressBar = document.getElementById('progressBar');
            const statusText = document.getElementById('statusText');
            
            progressBar.style.width = progress + '%';
            progressBar.textContent = progress + '%';
            statusText.textContent = message;
        }
        
        async function showResult() {
            const modelViewer = document.getElementById('modelViewer');
            const emptyState = document.getElementById('emptyState');
            const downloadBtn = document.getElementById('downloadBtn');
            const modelUrl = `${API_BASE}/experimental/download/${currentTaskId}`;
            
            console.log('[Experimental] Loading model from:', modelUrl);
            updateProgress(95, '正在加载3D模型...');
            
            modelViewer.src = modelUrl;
            modelViewer.style.display = 'block';
            emptyState.style.display = 'none';
            
            let loadingAttempts = 0;
            const maxAttempts = 3;
            
            // 加载进度
            modelViewer.addEventListener('progress', (e) => {
                if (e.detail && e.detail.totalProgress) {
                    const pct = Math.round(e.detail.totalProgress * 100);
                    updateProgress(95, `正在加载3D模型... ${pct}%`);
                }
            });
            
            // 加载成功
            modelViewer.addEventListener('load', () => {
                console.log('[Experimental] Model loaded successfully');
                updateProgress(100, '生成完成！');
            }, { once: true });
            
            // 加载失败 - 自动重试
            modelViewer.addEventListener('error', function onError(e) {
                loadingAttempts++;
                const errMsg = e.detail ? (e.detail.message || JSON.stringify(e.detail)) : '未知错误';
                console.error('[Experimental] Model load error:', errMsg);
                
                if (loadingAttempts < maxAttempts) {
                    updateProgress(90, `加载失败(${loadingAttempts}/${maxAttempts})，重试中...`);
                    setTimeout(() => {
                        modelViewer.src = '';
                        setTimeout(() => { modelViewer.src = modelUrl; }, 500);
                    }, 1000);
                } else {
                    // 重试耗尽，移除自身监听防止死循环
                    modelViewer.removeEventListener('error', onError);
                    updateProgress(100, '生成完成！');
                    showError('模型加载失败，您可以点击"下载GLB"按钮下载模型文件后在本地查看');
                }
            });
            
            downloadBtn.href = modelUrl;
            downloadBtn.style.display = 'inline-block';
            
            showSuccess('🎉 3D模型生成成功！');
            resetUI();
        }
        
        function resetUI() {
            const startBtn = document.getElementById('startBtn');
            startBtn.disabled = false;
            startBtn.textContent = '🚀 开始生成';
        }
        
        function showError(message) {
            const errorDiv = document.getElementById('errorMessage');
            errorDiv.textContent = message;
            errorDiv.style.display = 'block';
            setTimeout(() => {
                errorDiv.style.display = 'none';
            }, 5000);
        }
        
        function showSuccess(message) {
            const successDiv = document.getElementById('successMessage');
            successDiv.textContent = message;
            successDiv.style.display = 'block';
            setTimeout(() => {
                successDiv.style.display = 'none';
            }, 5000);
        }
    </script>
</body>
</html>
