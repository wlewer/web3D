<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web3D 管理后台</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f5f7fa;
        }
        
        /* 侧边栏 */
        .sidebar {
            position: fixed;
            left: 0;
            top: 0;
            bottom: 0;
            width: 240px;
            background: #1a1f36;
            color: white;
            padding: 20px 0;
        }
        
        .sidebar-header {
            padding: 0 20px 20px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        
        .sidebar-header h2 {
            font-size: 20px;
            margin-bottom: 5px;
        }
        
        .sidebar-header p {
            font-size: 12px;
            opacity: 0.7;
        }
        
        .nav-menu {
            list-style: none;
            padding: 20px 0;
        }
        
        .nav-item {
            padding: 12px 20px;
            cursor: pointer;
            transition: background 0.2s;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .nav-item:hover {
            background: rgba(255,255,255,0.1);
        }
        
        .nav-item.active {
            background: rgba(102, 126, 234, 0.3) !important;
            border-left: 3px solid #667eea !important;
            color: #fff;
        }
        
        .nav-item.external {
            background: rgba(17, 153, 142, 0.1);
            border-left: 3px solid transparent;
        }
        
        .nav-item.external:hover {
            background: rgba(17, 153, 142, 0.2);
        }
        
        .nav-item.external.active {
            background: rgba(102, 126, 234, 0.3) !important;
            border-left: 3px solid #667eea !important;
        }
        
        /* 编辑器页面样式 */
        .editor-container {
            width: 100%;
            height: calc(100vh - 120px);
            border: none;
            border-radius: 10px;
            background: #1a1f36;
        }
        
        .nav-icon {
            font-size: 18px;
        }
        
        /* 主内容区 */
        .main-content {
            margin-left: 240px;
            padding: 30px;
        }
        
        .header {
            background: white;
            padding: 20px 30px;
            border-radius: 10px;
            margin-bottom: 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }
        
        .header h1 {
            font-size: 24px;
            color: #333;
        }
        
        .user-info {
            display: flex;
            align-items: center;
            gap: 15px;
        }
        
        .user-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
        }
        
        .btn-logout {
            padding: 8px 16px;
            background: #f44336;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
        }
        
        .btn-logout:hover {
            background: #d32f2f;
        }
        
        /* 统计卡片 */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .stat-card {
            background: white;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }
        
        .stat-label {
            font-size: 14px;
            color: #666;
            margin-bottom: 10px;
        }
        
        .stat-value {
            font-size: 32px;
            font-weight: bold;
            color: #333;
            margin-bottom: 5px;
        }
        
        .stat-change {
            font-size: 12px;
            color: #4caf50;
        }
        
        .stat-change.negative {
            color: #f44336;
        }
        
        /* 功能区域 */
        .section {
            background: white;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
            margin-bottom: 20px;
        }
        
        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        
        .section-title {
            font-size: 18px;
            color: #333;
        }
        
        .btn-primary {
            padding: 8px 16px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
        }
        
        .btn-primary:hover {
            opacity: 0.9;
        }
        
        /* 表格 */
        .data-table {
            width: 100%;
            border-collapse: collapse;
        }
        
        .data-table th,
        .data-table td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #e0e0e0;
        }
        
        .data-table th {
            background: #f5f7fa;
            font-weight: 600;
            color: #666;
            font-size: 14px;
        }
        
        .data-table td {
            font-size: 14px;
            color: #333;
        }
        
        .status-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 500;
        }
        
        .status-active {
            background: #e8f5e9;
            color: #2e7d32;
        }
        
        .status-pending {
            background: #fff3e0;
            color: #ef6c00;
        }
        
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #999;
        }
        
        .empty-state-icon {
            font-size: 48px;
            margin-bottom: 15px;
        }
        
        /* 加载状态 */
        .loading {
            text-align: center;
            padding: 40px;
            color: #666;
        }
        
        .spinner {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 15px;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <!-- 侧边栏 -->
    <aside class="sidebar">
        <div class="sidebar-header">
            <h2>🎨 Web3D</h2>
            <p>管理后台 v1.0</p>
        </div>
        
        <ul class="nav-menu">
            <li class="nav-item active" data-page="dashboard">
                <span class="nav-icon">📊</span>
                <span>控制台</span>
            </li>
            <li class="nav-item" data-page="users">
                <span class="nav-icon">👥</span>
                <span>用户管理</span>
            </li>
            <li class="nav-item" data-page="models">
                <span class="nav-icon">🎲</span>
                <span>3D模型</span>
            </li>
            <li class="nav-item" data-page="templates">
                <span class="nav-icon">🎨</span>
                <span>模板管理</span>
            </li>
            <li class="nav-item" data-page="editor">
                <span class="nav-icon">🖌️</span>
                <span>SuperSplat编辑器</span>
            </li>
            <li class="nav-item" data-page="spark-editor">
                <span class="nav-icon">✨</span>
                <span>threepipe</span>
            </li>
            <li class="nav-item external" data-page="experimental">
                <span class="nav-icon">🧪</span>
                <span>AI 3D生成实验</span>
            </li>
            <li class="nav-item" data-page="settings">
                <span class="nav-icon">⚙️</span>
                <span>系统设置</span>
            </li>
        </ul>
    </aside>
    
    <!-- 主内容区 -->
    <main class="main-content">
        <!-- 顶部栏 -->
        <header class="header">
            <h1 id="pageTitle">控制台</h1>
            <div class="user-info">
                <div class="user-avatar" id="userAvatar">U</div>
                <div>
                    <div id="userName">加载中...</div>
                    <div style="font-size: 12px; color: #666;" id="userRole">角色</div>
                </div>
                <button class="btn-logout" onclick="logout()">退出登录</button>
            </div>
        </header>
        
        <!-- Dashboard页面 -->
        <div id="dashboardPage">
            <!-- 统计卡片 -->
            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-label">总用户数</div>
                    <div class="stat-value" id="totalUsers">-</div>
                    <div class="stat-change">+0% 较上周</div>
                </div>
                
                <div class="stat-card">
                    <div class="stat-label">3D模型总数</div>
                    <div class="stat-value" id="totalModels">-</div>
                    <div class="stat-change">+0% 较上周</div>
                </div>
                
                <div class="stat-card">
                    <div class="stat-label">今日活跃用户</div>
                    <div class="stat-value" id="activeUsers">-</div>
                    <div class="stat-change">+0% 较昨日</div>
                </div>
                
                <div class="stat-card">
                    <div class="stat-label">存储空间使用</div>
                    <div class="stat-value" id="storageUsed">-</div>
                    <div class="stat-change">0% 已使用</div>
                </div>
            </div>
            
            <!-- 最近活动 -->
            <div class="section">
                <div class="section-header">
                    <h3 class="section-title">最近活动</h3>
                    <button class="btn-primary">查看全部</button>
                </div>
                
                <div class="empty-state">
                    <div class="empty-state-icon">📭</div>
                    <p>暂无数据</p>
                    <p style="font-size: 12px; margin-top: 10px;">这是简化版后台，完整功能请使用Refine框架开发</p>
                </div>
            </div>
        </div>
        
        <!-- 其他页面占位 -->
        <div id="otherPages" style="display: none;">
            <div class="section">
                <div class="empty-state">
                    <div class="empty-state-icon">🚧</div>
                    <p>功能开发中...</p>
                    <p style="font-size: 12px; margin-top: 10px;">此模块将在Refine后台中实现</p>
                </div>
            </div>
        </div>
        
        <!-- SuperSplat编辑器页面 -->
        <div id="editorPage" style="display: none;">
            <div class="section" style="padding: 0; overflow: hidden;">
                <iframe 
                    id="editorIframe" 
                    class="editor-container" 
                    src="/app/supersplat/index.html"
                    sandbox="allow-scripts allow-same-origin allow-modals allow-forms allow-popups"
                    onload="autoExpandSuperSplatPanel(this)"
                ></iframe>
            </div>
        </div>
        
        <!-- Spark编辑器页面 -->
        <div id="sparkEditorPage" style="display: none;">
            <div class="section" style="padding: 0; overflow: hidden;">
                <iframe 
                    id="sparkEditorIframe" 
                    class="editor-container" 
                    src="/app/spark-editor/index.html"
                    sandbox="allow-scripts allow-same-origin allow-modals allow-forms allow-popups"
                ></iframe>
            </div>
        </div>
        
        <!-- AI 3D生成实验页面 -->
        <div id="experimentalPage" style="display: none; height: calc(100vh - 140px);">
            <iframe 
                id="experimentalIframe" 
                class="editor-container" 
                src="/app/experimental-3d.html"
                sandbox="allow-scripts allow-same-origin allow-modals allow-forms allow-popups"
            ></iframe>
        </div>
    </main>
    
    <script>
        const API_BASE = 'http://localhost:8000/api/v1';
        
        // 检查登录状态
        function checkAuth() {
            const token = localStorage.getItem('access_token');
            if (!token) {
                window.location.href = '/login.html';
                return false;
            }
            return true;
        }
        
        // 获取用户信息
        async function fetchUserInfo() {
            try {
                const response = await fetch(`${API_BASE}/auth/me`, {
                    headers: {
                        'Authorization': `Bearer ${localStorage.getItem('access_token')}`
                    }
                });
                
                if (response.ok) {
                    const data = await response.json();
                    const user = data.data;
                    
                    document.getElementById('userName').textContent = user.username;
                    document.getElementById('userRole').textContent = getRoleText(user.role);
                    document.getElementById('userAvatar').textContent = user.username.charAt(0).toUpperCase();
                    
                    return user;
                } else {
                    logout();
                }
            } catch (error) {
                console.error('Fetch user info error:', error);
            }
        }
        
        // 获取角色文本
        function getRoleText(role) {
            const roles = {
                'admin': '管理员',
                'editor': '编辑者',
                'user': '普通用户',
                'guest': '访客'
            };
            return roles[role] || role;
        }
        
        // 退出登录
        function logout() {
            localStorage.removeItem('access_token');
            localStorage.removeItem('refresh_token');
            localStorage.removeItem('user_info');
            window.location.href = '/login.html';
        }
        
        // 导航切换
        document.querySelectorAll('.nav-item').forEach(item => {
            item.addEventListener('click', function() {
                // 移除所有active类
                document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
                // 添加active类到当前项
                this.classList.add('active');
                
                const page = this.dataset.page;
                document.getElementById('pageTitle').textContent = this.querySelector('span:last-child').textContent;
                
                // 页面切换逻辑
                if (page === 'dashboard') {
                    document.getElementById('dashboardPage').style.display = 'block';
                    document.getElementById('otherPages').style.display = 'none';
                    document.getElementById('editorPage').style.display = 'none';
                    document.getElementById('sparkEditorPage').style.display = 'none';
                    document.getElementById('experimentalPage').style.display = 'none';
                } else if (page === 'editor') {
                    document.getElementById('dashboardPage').style.display = 'none';
                    document.getElementById('otherPages').style.display = 'none';
                    document.getElementById('editorPage').style.display = 'block';
                    document.getElementById('sparkEditorPage').style.display = 'none';
                    document.getElementById('experimentalPage').style.display = 'none';
                    // 延迟加载iframe以提高性能
                    const iframe = document.getElementById('editorIframe');
                    if (!iframe.src || iframe.src === 'about:blank') {
                        iframe.src = '/app/supersplat/index.html';
                    }
                } else if (page === 'spark-editor') {
                    document.getElementById('dashboardPage').style.display = 'none';
                    document.getElementById('otherPages').style.display = 'none';
                    document.getElementById('editorPage').style.display = 'none';
                    document.getElementById('sparkEditorPage').style.display = 'block';
                    document.getElementById('experimentalPage').style.display = 'none';
                    // 延迟加载iframe以提高性能
                    const iframe = document.getElementById('sparkEditorIframe');
                    if (!iframe.src || iframe.src === 'about:blank') {
                        iframe.src = '/app/spark-editor/index.html';
                    }
                } else if (page === 'experimental') {
                    document.getElementById('dashboardPage').style.display = 'none';
                    document.getElementById('otherPages').style.display = 'none';
                    document.getElementById('editorPage').style.display = 'none';
                    document.getElementById('sparkEditorPage').style.display = 'none';
                    document.getElementById('experimentalPage').style.display = 'block';
                    // 延迟加载iframe以提高性能
                    const iframe = document.getElementById('experimentalIframe');
                    if (!iframe.src || iframe.src === 'about:blank') {
                        iframe.src = '/app/experimental-3d.html';
                    }
                } else {
                    document.getElementById('dashboardPage').style.display = 'none';
                    document.getElementById('otherPages').style.display = 'block';
                    document.getElementById('editorPage').style.display = 'none';
                    document.getElementById('sparkEditorPage').style.display = 'none';
                    document.getElementById('experimentalPage').style.display = 'none';
                }
            });
        });
        
        // 初始化
        window.addEventListener('load', async () => {
            if (!checkAuth()) return;
            
            await fetchUserInfo();
            
            // 模拟统计数据（实际应从API获取）
            document.getElementById('totalUsers').textContent = '1';
            document.getElementById('totalModels').textContent = '0';
            document.getElementById('activeUsers').textContent = '1';
            document.getElementById('storageUsed').textContent = '0 MB';
        });
    </script>
</body>
</html>
