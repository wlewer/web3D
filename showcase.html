<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartAI 3D - 模型展示</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0a0a0f;
            color: white;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            overflow: hidden;
            height: 100vh;
        }

        /* 头部 */
        .header {
            padding: 20px 40px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(10, 10, 15, 0.9);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
        }

        .header h1 {
            font-size: 24px;
            font-weight: 600;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .header .subtitle {
            font-size: 14px;
            color: rgba(255, 255, 255, 0.5);
        }

        /* 网格布局 */
        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            grid-template-rows: repeat(2, 1fr);
            gap: 20px;
            padding: 20px 40px;
            height: calc(100vh - 80px);
        }

        /* 卡片 */
        .gallery-card {
            position: relative;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 16px;
            overflow: hidden;
            transition: all 0.3s ease;
        }

        .gallery-card:hover {
            border-color: rgba(102, 126, 234, 0.3);
            box-shadow: 0 8px 32px rgba(102, 126, 234, 0.2);
            transform: translateY(-4px);
        }

        /* 3D 画布容器 */
        .card-3d-container {
            width: 100%;
            height: 100%;
            position: relative;
        }

        .card-3d-container canvas {
            width: 100% !important;
            height: 100% !important;
            display: block;
        }

        /* 卡片信息 */
        .card-info {
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 10;
        }

        .card-title {
            font-size: 18px;
            font-weight: 600;
            color: white;
            margin-bottom: 4px;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.5);
        }

        .card-tag {
            display: inline-block;
            padding: 4px 12px;
            background: rgba(102, 126, 234, 0.2);
            border: 1px solid rgba(102, 126, 234, 0.3);
            border-radius: 20px;
            font-size: 12px;
            color: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
        }

        /* 操作按钮 */
        .card-actions {
            position: absolute;
            top: 20px;
            right: 20px;
            z-index: 10;
            display: flex;
            gap: 8px;
        }

        .btn-action {
            padding: 8px 16px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            color: rgba(255, 255, 255, 0.8);
            font-size: 12px;
            cursor: pointer;
            backdrop-filter: blur(10px);
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .btn-action:hover {
            background: rgba(102, 126, 234, 0.3);
            border-color: rgba(102, 126, 234, 0.5);
            color: white;
        }

        /* 底部信息 */
        .card-footer {
            position: absolute;
            bottom: 20px;
            left: 20px;
            right: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 10;
        }

        .hint-text {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.5);
        }

        .fps-counter {
            padding: 4px 8px;
            background: rgba(0, 0, 0, 0.5);
            border-radius: 6px;
            font-size: 11px;
            color: #667eea;
            font-weight: 600;
        }

        /* 加载动画 */
        .loading-overlay {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(0, 0, 0, 0.3);
            z-index: 5;
            transition: opacity 0.5s;
        }

        .loading-overlay.hidden {
            opacity: 0;
            pointer-events: none;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(102, 126, 234, 0.2);
            border-top-color: #667eea;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* 背景星星 */
        .star {
            position: absolute;
            background: rgba(102, 126, 234, 0.3);
            border-radius: 50%;
            pointer-events: none;
        }

        /* 预览弹窗 */
        .preview-modal {
            position: fixed;
            inset: 0;
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .preview-overlay {
            position: absolute;
            inset: 0;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(8px);
        }

        .preview-content {
            position: relative;
            width: 90vw;
            max-width: 1200px;
            height: 85vh;
            background: rgba(10, 10, 15, 0.95);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .preview-header {
            padding: 20px 30px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .preview-header h2 {
            font-size: 24px;
            font-weight: 600;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .close-btn {
            width: 40px;
            height: 40px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            background: rgba(255, 255, 255, 0.05);
            color: white;
            font-size: 20px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
        }

        .close-btn:hover {
            background: rgba(255, 77, 77, 0.3);
            border-color: rgba(255, 77, 77, 0.5);
        }

        .preview-info {
            padding: 15px 30px;
            display: flex;
            align-items: center;
            gap: 15px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .preview-tag {
            padding: 4px 12px;
            background: rgba(102, 126, 234, 0.2);
            border: 1px solid rgba(102, 126, 234, 0.3);
            border-radius: 20px;
            font-size: 12px;
            color: rgba(255, 255, 255, 0.9);
        }

        .preview-description {
            font-size: 14px;
            color: rgba(255, 255, 255, 0.6);
        }

        .preview-3d-container {
            flex: 1;
            position: relative;
        }

        .preview-3d-container canvas {
            width: 100% !important;
            height: 100% !important;
            display: block;
        }

        .preview-footer {
            padding: 15px 30px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            background: rgba(0, 0, 0, 0.3);
        }

        .preview-hint {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.5);
        }

        /* 响应式 */
        @media (max-width: 1200px) {
            .gallery-grid {
                grid-template-columns: repeat(2, 1fr);
                grid-template-rows: repeat(3, 1fr);
                padding: 20px;
                gap: 16px;
            }
        }

        @media (max-width: 768px) {
            .gallery-grid {
                grid-template-columns: 1fr;
                grid-template-rows: repeat(6, 1fr);
                padding: 16px;
                gap: 12px;
            }

            .header {
                padding: 16px 20px;
            }

            .header h1 {
                font-size: 20px;
            }

            .preview-content {
                width: 95vw;
                height: 90vh;
            }
        }
    </style>
</head>
<body>
    <!-- 头部 -->
    <div class="header">
        <div>
            <h1>SmartAI 3D 模型展示</h1>
            <div class="subtitle">3D Gaussian Splatting 渲染引擎 · 高性能实时渲染</div>
        </div>
    </div>

    <!-- 6 个模型卡片 -->
    <div class="gallery-grid" id="galleryGrid">
        <!-- 卡片通过 JavaScript 动态生成 -->
    </div>

    <!-- 背景星星容器 -->
    <div id="starsContainer" style="position: fixed; inset: 0; pointer-events: none; z-index: 0;"></div>

    <!-- Import Map - ES Modules -->
    <script type="importmap">
    {
        "imports": {
            "three": "https://cdn.jsdelivr.net/npm/three@0.180.0/build/three.module.js",
            "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.180.0/examples/jsm/"
        }
    }
    </script>

    <script type="module">
        console.log('📦 开始加载 Three.js...');
        
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
        
        console.log('✅ Three.js 加载成功:', THREE.REVISION);

        // 模型数据（使用公开可用的 GLB 模型）
        const MODELS = [
            {
                title: 'Damaged Helmet',
                tag: 'GLB · 道具',
                url: 'https://raw.githubusercontent.com/KhronosGroup/glTF-Sample-Assets/main/Models/DamagedHelmet/glTF-Binary/DamagedHelmet.glb',
                emoji: '⛑️',
                description: '科幻风格的破损头盔模型'
            },
            {
                title: 'Flight Helmet',
                tag: 'GLB · 装备',
                url: 'https://raw.githubusercontent.com/KhronosGroup/glTF-Sample-Assets/main/Models/FlightHelmet/glTF/FlightHelmet.glb',
                emoji: '🪖',
                description: '复古飞行头盔，细节丰富'
            },
            {
                title: 'Avocado',
                tag: 'GLB · 食物',
                url: 'https://raw.githubusercontent.com/KhronosGroup/glTF-Sample-Assets/main/Models/Avocado/glTF-Binary/Avocado.glb',
                emoji: '',
                description: '高精度牛油果模型'
            },
            {
                title: 'Duck',
                tag: 'GLB · 动物',
                url: 'https://raw.githubusercontent.com/KhronosGroup/glTF-Sample-Assets/main/Models/Duck/glTF-Binary/Duck.glb',
                emoji: '🦆',
                description: '经典橡皮鸭模型'
            },
            {
                title: 'Boom Box',
                tag: 'GLB · 电子设备',
                url: 'https://raw.githubusercontent.com/KhronosGroup/glTF-Sample-Assets/main/Models/BoomBox/glTF-Binary/BoomBox.glb',
                emoji: '',
                description: '复古收音机模型'
            },
            {
                title: 'Lantern',
                tag: 'GLB · 装饰',
                url: 'https://raw.githubusercontent.com/KhronosGroup/glTF-Sample-Assets/main/Models/Lantern/glTF-Binary/Lantern.glb',
                emoji: '🏮',
                description: '中式灯笼模型'
            }
        ];

        // 全局变量
        const scenes = [];
        const cameras = [];
        const renderers = [];
        const controls = [];
        const models = [];
        const stars = [];
        let animationId = null;
        let currentModelIndex = null;

        // 创建星星背景
        function createStars() {
            const container = document.getElementById('starsContainer');
            for (let i = 0; i < 200; i++) {
                const star = document.createElement('div');
                star.className = 'star';
                star.style.left = Math.random() * 100 + '%';
                star.style.top = Math.random() * 100 + '%';
                star.style.width = Math.random() * 2 + 1 + 'px';
                star.style.height = star.style.width;
                star.style.opacity = Math.random() * 0.5 + 0.2;
                container.appendChild(star);
            }
        }

        // 创建卡片 DOM
        function createCard(model, index) {
            const card = document.createElement('div');
            card.className = 'gallery-card';
            card.id = `card-${index}`;

            card.innerHTML = `
                <div class="card-3d-container" id="canvas-${index}" style="cursor: pointer;"></div>
                <div class="card-info">
                    <div class="card-title">${model.emoji} ${model.title}</div>
                    <span class="card-tag">${model.tag}</span>
                </div>
                <div class="card-actions">
                    <button class="btn-action" onclick="event.stopPropagation(); handleScreenshot(${index})">
                         截图
                    </button>
                    <button class="btn-action" onclick="event.stopPropagation(); openPreview(${index})">
                        🔍 详情
                    </button>
                </div>
                <div class="loading-overlay" id="loading-${index}">
                    <div class="spinner"></div>
                </div>
                <div class="card-footer">
                    <span class="hint-text">点击预览 · 拖拽旋转 · 滚轮缩放</span>
                    <span class="fps-counter" id="fps-${index}">FPS: --</span>
                </div>
            `;
            
            // 点击卡片打开预览
            card.addEventListener('click', () => {
                openPreview(index);
            });

            return card;
        }

        // 初始化场景
        async function initScene(index, modelUrl) {
            const container = document.getElementById(`canvas-${index}`);
            const loadingOverlay = document.getElementById(`loading-${index}`);
            const fpsCounter = document.getElementById(`fps-${index}`);

            if (!container) {
                console.error(`❌ 容器 ${index} 不存在`);
                return;
            }
            
            console.log(`🎨 初始化场景 ${index}: ${MODELS[index].title}`);

            // 场景
            const scene = new THREE.Scene();
            scene.background = new THREE.Color(0x0a0a0f);
            scenes[index] = scene;

            // 添加环境光
            const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
            scene.add(ambientLight);

            // 添加主光源
            const mainLight = new THREE.DirectionalLight(0xffffff, 1.2);
            mainLight.position.set(5, 5, 5);
            scene.add(mainLight);

            // 添加补光
            const fillLight = new THREE.DirectionalLight(0xffffff, 0.4);
            fillLight.position.set(-5, -5, -5);
            scene.add(fillLight);

            // 添加底部光
            const bottomLight = new THREE.DirectionalLight(0x667eea, 0.3);
            bottomLight.position.set(0, -3, 0);
            scene.add(bottomLight);

            // 相机
            const camera = new THREE.PerspectiveCamera(
                50,
                container.clientWidth / container.clientHeight,
                0.1,
                1000
            );
            camera.position.set(0, 0.6, 4);
            cameras[index] = camera;

            // 渲染器
            const renderer = new THREE.WebGLRenderer({ 
                antialias: true,
                alpha: true 
            });
            renderer.setSize(container.clientWidth, container.clientHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            renderer.outputColorSpace = THREE.SRGBColorSpace;
            renderer.toneMapping = THREE.ACESFilmicToneMapping;
            renderer.toneMappingExposure = 1.2;
            container.appendChild(renderer.domElement);
            renderers[index] = renderer;

            // 控制器
            const orbitControls = new OrbitControls(camera, renderer.domElement);
            orbitControls.enableDamping = true;
            orbitControls.dampingFactor = 0.05;
            orbitControls.target.set(0, 0, 0);
            orbitControls.enabled = true;
            orbitControls.minDistance = 0.5;
            orbitControls.maxDistance = 20;
            orbitControls.autoRotate = true;
            orbitControls.autoRotateSpeed = 0.5;
            controls[index] = orbitControls;

            // 加载模型
            try {
                console.log(` 加载模型 ${index}: ${modelUrl}`);
                await loadGLBModel(index, modelUrl, scene);
                console.log(`✅ 模型 ${index} 加载成功`);
                
                // 隐藏加载层
                setTimeout(() => {
                    loadingOverlay.classList.add('hidden');
                }, 300);
            } catch (error) {
                console.error(`❌ 模型 ${index} 加载失败:`, error);
                loadingOverlay.innerHTML = `
                    <div style="text-align: center; color: #ff6b6b; padding: 20px;">
                        <div style="font-size: 32px; margin-bottom: 10px;">️</div>
                        <div style="font-size: 14px;">加载失败</div>
                        <div style="font-size: 11px; margin-top: 8px; opacity: 0.7;">${error.message}</div>
                    </div>`;
            }

            // 响应式
            window.addEventListener('resize', () => {
                onWindowResize(index, container);
            });
        }

        // 加载 GLB 模型
        async function loadGLBModel(index, modelUrl, scene) {
            return new Promise((resolve, reject) => {
                const loader = new GLTFLoader();
                loader.load(
                    modelUrl,
                    (gltf) => {
                        const model = gltf.scene;
                        
                        // 智能居中
                        const box = new THREE.Box3().setFromObject(model);
                        const center = box.getCenter(new THREE.Vector3());
                        const size = box.getSize(new THREE.Vector3());
                        const maxDim = Math.max(size.x, size.y, size.z);
                        
                        // 居中并缩放
                        model.position.sub(center);
                        const scale = 2 / maxDim;
                        model.scale.setScalar(scale);
                        
                        scene.add(model);
                        models[index] = model;
                        resolve();
                    },
                    undefined,
                    (error) => reject(error)
                );
            });
        }

        // 打开预览弹窗
        function openPreview(index) {
            const model = MODELS[index];
            currentModelIndex = index;
            
            // 创建弹窗
            const modal = document.createElement('div');
            modal.className = 'preview-modal';
            modal.id = 'preview-modal';
            
            modal.innerHTML = `
                <div class="preview-overlay" onclick="closePreview()"></div>
                <div class="preview-content">
                    <div class="preview-header">
                        <h2>${model.emoji} ${model.title}</h2>
                        <button class="close-btn" onclick="closePreview()">✕</button>
                    </div>
                    <div class="preview-info">
                        <span class="preview-tag">${model.tag}</span>
                        <p class="preview-description">${model.description}</p>
                    </div>
                    <div class="preview-3d-container" id="preview-canvas"></div>
                    <div class="preview-footer">
                        <span class="preview-hint">拖拽旋转 · 滚轮缩放 · ESC 关闭</span>
                        <button class="btn-action" onclick="handlePreviewScreenshot()">📷 截图保存</button>
                    </div>
                </div>
            `;
            
            document.body.appendChild(modal);
            
            // 初始化预览场景
            setTimeout(() => initPreviewScene(index), 100);
            
            // ESC 关闭
            document.addEventListener('keydown', handleEscKey);
        }

        // 关闭预览弹窗
        function closePreview() {
            const modal = document.getElementById('preview-modal');
            if (modal) {
                modal.remove();
            }
            currentModelIndex = null;
            document.removeEventListener('keydown', handleEscKey);
        }

        // ESC 键处理
        function handleEscKey(e) {
            if (e.key === 'Escape') {
                closePreview();
            }
        }

        // 初始化预览场景
        let previewScene, previewCamera, previewRenderer, previewControls;
        
        async function initPreviewScene(index) {
            const container = document.getElementById('preview-canvas');
            if (!container) return;
            
            // 场景
            previewScene = new THREE.Scene();
            previewScene.background = new THREE.Color(0x0a0a0f);
            
            // 灯光
            const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
            previewScene.add(ambientLight);
            
            const mainLight = new THREE.DirectionalLight(0xffffff, 1);
            mainLight.position.set(5, 5, 5);
            previewScene.add(mainLight);
            
            const fillLight = new THREE.DirectionalLight(0xffffff, 0.3);
            fillLight.position.set(-5, -5, -5);
            previewScene.add(fillLight);
            
            // 相机
            previewCamera = new THREE.PerspectiveCamera(
                50,
                container.clientWidth / container.clientHeight,
                0.1,
                1000
            );
            previewCamera.position.set(0, 0.6, 4);
            
            // 渲染器
            previewRenderer = new THREE.WebGLRenderer({ antialias: true });
            previewRenderer.setSize(container.clientWidth, container.clientHeight);
            previewRenderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            previewRenderer.outputColorSpace = THREE.SRGBColorSpace;
            container.appendChild(previewRenderer.domElement);
            
            // 控制器
            previewControls = new OrbitControls(previewCamera, previewRenderer.domElement);
            previewControls.enableDamping = true;
            previewControls.dampingFactor = 0.05;
            previewControls.autoRotate = true;
            previewControls.autoRotateSpeed = 1;
            
            // 加载模型
            const model = MODELS[index];
            await loadPreviewModel(model.url, previewScene);
            
            // 启动预览动画
            animatePreview();
        }

        // 加载预览模型
        async function loadPreviewModel(modelUrl, scene) {
            return new Promise((resolve, reject) => {
                const loader = new GLTFLoader();
                loader.load(
                    modelUrl,
                    (gltf) => {
                        const model = gltf.scene;
                        
                        // 智能居中
                        const box = new THREE.Box3().setFromObject(model);
                        const center = box.getCenter(new THREE.Vector3());
                        const size = box.getSize(new THREE.Vector3());
                        const maxDim = Math.max(size.x, size.y, size.z);
                        
                        // 居中并放大（预览模式显示更大）
                        model.position.sub(center);
                        const scale = 3 / maxDim;
                        model.scale.setScalar(scale);
                        
                        scene.add(model);
                        resolve();
                    },
                    undefined,
                    (error) => reject(error)
                );
            });
        }

        // 预览动画循环
        function animatePreview() {
            if (!previewScene || !previewCamera || !previewRenderer || !previewControls) return;
            if (!document.getElementById('preview-modal')) return;
            
            requestAnimationFrame(animatePreview);
            previewControls.update();
            previewRenderer.render(previewScene, previewCamera);
        }

        // 预览截图
        window.handlePreviewScreenshot = function() {
            if (!previewRenderer) return;
            
            previewRenderer.render(previewScene, previewCamera);
            const dataURL = previewRenderer.domElement.toDataURL('image/png');
            
            const link = document.createElement('a');
            link.download = `${MODELS[currentModelIndex].title}-preview.png`;
            link.href = dataURL;
            link.click();
        };

        // 动画循环
        function animate() {
            animationId = requestAnimationFrame(animate);

            scenes.forEach((scene, index) => {
                if (scene && cameras[index] && renderers[index] && controls[index]) {
                    controls[index].update();
                    renderers[index].render(scene, cameras[index]);
                    
                    // 更新 FPS
                    updateFPS(index);
                }
            });
        }

        // FPS 计数器
        const frameCounts = [];
        const lastTimes = [];
        
        function updateFPS(index) {
            if (!frameCounts[index]) frameCounts[index] = 0;
            if (!lastTimes[index]) lastTimes[index] = performance.now();
            
            frameCounts[index]++;
            const now = performance.now();
            const delta = now - lastTimes[index];
            
            if (delta >= 1000) {
                const fps = Math.round((frameCounts[index] * 1000) / delta);
                const fpsCounter = document.getElementById(`fps-${index}`);
                if (fpsCounter) {
                    fpsCounter.textContent = `FPS: ${fps}`;
                }
                frameCounts[index] = 0;
                lastTimes[index] = now;
            }
        }

        // 窗口调整
        function onWindowResize(index, container) {
            const camera = cameras[index];
            const renderer = renderers[index];

            if (!camera || !renderer) return;

            camera.aspect = container.clientWidth / container.clientHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(container.clientWidth, container.clientHeight);
        }

        // 截图功能
        window.handleScreenshot = function(index) {
            const renderer = renderers[index];
            if (!renderer) return;

            renderer.render(scenes[index], cameras[index]);
            const dataURL = renderer.domElement.toDataURL('image/png');
            
            const link = document.createElement('a');
            link.download = `model-${index}.png`;
            link.href = dataURL;
            link.click();
        };

        // 初始化所有卡片
        function initAllCards() {
            const grid = document.getElementById('galleryGrid');

            MODELS.forEach((model, index) => {
                const card = createCard(model, index);
                grid.appendChild(card);

                // 延迟初始化，避免卡顿
                setTimeout(() => {
                    initScene(index, model.url);
                }, index * 100);
            });

            // 启动动画循环
            animate();
        }

        // 启动
        createStars();
        initAllCards();
    </script>
</body>
</html>
